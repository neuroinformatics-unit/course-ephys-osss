name: Quarto Docs

on:
  pull_request:
    paths:
      - 'book/**'
      - '.github/workflows/quarto-docs.yml'
      - 'README.md'
      - 'CONTRIBUTING.md'
  push:
    branches:
      - main
    paths:
      - 'book/**'
      - '.github/workflows/quarto-docs.yml'
      - 'README.md'
      - 'CONTRIBUTING.md'

permissions:
  contents: write

concurrency:
  group: quarto-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render book
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: book
          to: html

      - name: Remove render byproducts outside docs
        shell: bash
        run: rm -rf book/site_libs book/.quarto

      - name: Commit rendered docs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          if git diff --quiet -- docs; then
            echo "No rendered docs changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Update rendered docs"
          git push